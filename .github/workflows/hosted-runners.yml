name: hosted-runners

on:
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: ubuntu-runner
        run: |
          echo "OS: Ubuntu"
          hostname
          whoami

      - name: Check Installed Tools
        run: |
          docker --version
          python3 --version
          node --version
          git --version

  windows:
    runs-on: windows-latest

    steps:
      - name: windows-runner
        shell: powershell
        run: |
          Write-Host "OS: Windows"
          hostname
          whoami

  macos:
    runs-on: macos-latest

    steps:
      - name: macos-runner
        run: |
          echo "OS: macOS"
          hostname
          whoami
          
