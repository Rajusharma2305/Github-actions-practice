name: Self Hosted Runner

on:
  workflow_dispatch:

jobs:

  test-runner:
    runs-on: self-hosted

    steps:

      - name: Machine Details
        run: |
          hostname
          pwd
          whoami

      - name: Create File
        run: |
          echo "Hello from self hosted runner" > myfile.txt

      - name: Verify File
        run: |
          ls -l
